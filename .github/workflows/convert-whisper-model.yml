name: Convert Whisper Cantonese Model

on:
  # Manual trigger only - run once to create the model release
  # The model files don't change often, so no need to auto-rebuild on each app release
  workflow_dispatch:
    inputs:
      model_id:
        description: 'HuggingFace model ID'
        required: false
        default: 'alvanlii/whisper-small-cantonese'
      release_tag:
        description: 'Release tag name (must be unique, e.g., whisper-cantonese-v1)'
        required: true
        default: 'whisper-cantonese-v1'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch transformers onnx onnxruntime onnxscript optimum[onnxruntime]

      - name: Convert model to sherpa-onnx format
        run: |
          MODEL_ID="${{ github.event.inputs.model_id }}"
          python scripts/convert_whisper_cantonese.py \
            --model-id "$MODEL_ID" \
            --output-dir ./sherpa-onnx-whisper-small-cantonese

      - name: List output files
        run: |
          ls -lah ./sherpa-onnx-whisper-small-cantonese/

      - name: Create release with model files
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: Whisper Cantonese Model (sherpa-onnx)
          body: |
            ## Whisper Small Cantonese - sherpa-onnx Format

            Converted from [alvanlii/whisper-small-cantonese](https://huggingface.co/alvanlii/whisper-small-cantonese)

            ### Performance
            - **CER (without punctuation)**: 7.93%
            - **CER (with punctuation)**: 9.72%
            - **Languages**: Cantonese (primary), English (HK accent)

            ### Files
            - `small-encoder.int8.onnx` - Encoder model (~88 MB)
            - `small-decoder.int8.onnx` - Decoder model (~186 MB)
            - `small-tokens.txt` - Token vocabulary (~0.7 MB)

            ### Total Size
            ~274 MB (int8 quantized)

            ### Usage
            The DualQuickIME app downloads these files from:
            ```
            https://github.com/awcjack/DualQuickIME/releases/download/${{ github.event.inputs.release_tag }}/
            ```
          files: |
            ./sherpa-onnx-whisper-small-cantonese/small-encoder.int8.onnx
            ./sherpa-onnx-whisper-small-cantonese/small-decoder.int8.onnx
            ./sherpa-onnx-whisper-small-cantonese/small-tokens.txt
          draft: false
          prerelease: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: sherpa-onnx-whisper-small-cantonese
          path: |
            ./sherpa-onnx-whisper-small-cantonese/small-encoder.int8.onnx
            ./sherpa-onnx-whisper-small-cantonese/small-decoder.int8.onnx
            ./sherpa-onnx-whisper-small-cantonese/small-tokens.txt
          retention-days: 7

      - name: Print download URLs
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          echo "============================================"
          echo "Model files uploaded to release: $TAG"
          echo "============================================"
          echo ""
          echo "Download URLs:"
          echo "  https://github.com/awcjack/DualQuickIME/releases/download/${TAG}/small-encoder.int8.onnx"
          echo "  https://github.com/awcjack/DualQuickIME/releases/download/${TAG}/small-decoder.int8.onnx"
          echo "  https://github.com/awcjack/DualQuickIME/releases/download/${TAG}/small-tokens.txt"
          echo ""
          echo "Update WHISPER_CANTONESE_BASE_URL in ModelDownloadManager.kt if needed:"
          echo "  private const val WHISPER_CANTONESE_BASE_URL = \"https://github.com/awcjack/DualQuickIME/releases/download/${TAG}\""
